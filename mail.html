<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>메일함</title>
<style>
  @import url('https://cdn.jsdelivr.net/npm/pretendard/dist/web/static/pretendard.css');

body {
  margin: 0;
  background: #0f1115;
  font-family: "Pretendard", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  color: #d1d5db;
  padding: 0 16px;
  box-sizing: border-box;
}

.container {
  width: 420px;
  max-width: 100%;
  margin: 60px auto;
  background: #14171d;
  border: 1px solid #2a2f3a;
  border-radius: 6px;
  padding: 16px;
  box-shadow: 0 0 0 1px rgba(255,255,255,0.02) inset;
  box-sizing: border-box;
}

.header {
  font-size: 13px;
  color: #9ca3af;
  margin-bottom: 12px;
  letter-spacing: 1px;
}

#mailList {
  max-height: 300px; 
  overflow-y: auto;
}

.mail-item {
  padding: 10px;
  border: 1px solid #2a2f3a;
  background: #0d0f14;
  border-radius: 4px;
  margin-bottom: 8px;
  cursor: pointer;
  transition: 0.15s;
}

.mail-item:hover {
  background: #10131a;
  border-color: #3b4252;
}

.mail-title {
  font-size: 13px;
  margin-bottom: 4px;
  color: #e5e7eb;
}

.mail-preview {
  font-size: 12px;
  color: #6b7280;
}

/* ===== 모달 ===== */

.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  justify-content: center;
  align-items: center;
  padding: 16px;
  box-sizing: border-box;
}

.modal-content {
  width: 480px;
  max-width: 100%;
  max-height: 80vh;
  overflow-y: auto;
  background: #14171d;
  border: 1px solid #2a2f3a;
  border-radius: 6px;
  padding: 16px;
  box-shadow: 0 0 0 1px rgba(255,255,255,0.02) inset;
  box-sizing: border-box;
}

#threadView > div:first-child {
  font-size: 13px;
  color: #9ca3af;
}

.mail-block {
  margin-top: 12px;
  padding: 10px;
  background: #0d0f14;
  border: 1px solid #2a2f3a;
  border-radius: 4px;
}

.mail-block.sent {
  background: #10141c;
  border-color: #3b4252;
}

.mail-meta {
  font-size: 11px;
  color: #6b7280;
  margin-bottom: 6px;
}

.mail-body {
  font-size: 13px;
  line-height: 1.5;
  white-space: pre-wrap;
  color: #e5e7eb;
  word-break: break-all;
}

.close-btn {
  margin-top: 14px;
  padding: 8px;
  width: 100%;
  background: #1c212b;
  border: 1px solid #2f3542;
  color: #cbd5e1;
  font-size: 12px;
  border-radius: 4px;
  cursor: pointer;
  transition: 0.15s;
  box-sizing: border-box;
}

.close-btn:hover {
  background: #232938;
}

.close-btn:active {
  transform: translateY(1px);
}

/* ── 모바일 ── */
@media (max-width: 480px) {
  body {
    padding: 0 12px;
  }

  .container {
    margin: 32px auto;
    padding: 14px;
    border-radius: 8px;
  }

  .mail-item {
    padding: 12px 10px;
  }

  .mail-title {
    font-size: 14px;
  }

  .mail-preview {
    font-size: 12px;
  }

  .modal {
    align-items: flex-end;  /* 모바일에서 바텀시트처럼 */
    padding: 0;
  }

  .modal-content {
    width: 100%;
    max-height: 85vh;
    border-radius: 12px 12px 0 0;
    padding: 20px 16px;
  }

  .mail-body {
    font-size: 14px;
  }

  .close-btn {
    padding: 13px;
    font-size: 13px;
  }

  @media (max-width: 480px) {
  #mailList {
    max-height: 60vh;   
    overflow-y: auto;
  }
}
}
</style>
</head>
<body>

<div class="container">
  <div class="header">메일함</div>
  <div id="mailList"></div>
</div>

<div class="modal" id="modal">
  <div class="modal-content">
    <div id="threadView"></div>
    <button class="close-btn" onclick="closeModal()">닫기</button>
  </div>
</div>

<script>

      },

        sent: true

  {

    mails: [

        content: "소넷 선생님께,\n\n현재 북서쪽 구역에서 확인된 포켓몬 폭주 관련 상황 공유드립니다.\n\n초기 진압 시도는 실패했고, 개체 수가 빠르게 증가하는 추세입니다.\n\n현장에 있던 학생 몇 명이 자발적으로 대응 중이나, 통제가 어려운 상태입니다.\n\n선생님 쪽에서 직접 지도 가능하신지 확인 부탁드립니다.\n통신 상태가 불안정해 연결 가능한 인원이 제한적입니다.\n\n가능하시면 즉시 회신 바랍니다.\n\n연구팀 드림."

  },
  {

      {

      },
      {

        sent: true
      }
    ]
  },
  {
    title: "[연구실] 좌표",
    mails: [
      {
        from: "no-reply@pokemonaca.com",
        to: "sonnet@zenith.poke",
        content: "소넷 선생님께,\n\n현장"
      },
      {
        from: "sonnet@zenith.poke",
        to: "no-reply@pokemonaca.com",
        content: "통신 문제 있습니까?",
        sent: true
      }
    ]
  }
];

const mailList = document.getElementById('mailList');

function renderList() {
  mailList.innerHTML = '';

  threads.forEach((thread, index) => {
    const last = thread.mails[thread.mails.length - 1];

    const div = document.createElement('div');
    div.className = 'mail-item';
    div.innerHTML = `
      <div class="mail-title">${thread.title}</div>
      <div class="mail-preview">${last.from} · ${last.content.slice(0,30)}...</div>
    `;

    div.onclick = () => openThread(index);
    mailList.appendChild(div);
  });
}

function openThread(index) {
  const thread = threads[index];
  const view = document.getElementById('threadView');

  view.innerHTML = `<div style="font-weight:bold; margin-bottom:10px;">${thread.title}</div>`;

  thread.mails.forEach(mail => {
    view.innerHTML += `
      <div class="mail-block ${mail.sent ? 'sent' : ''}">
        <div class="mail-meta">
          <strong>보낸사람:</strong> ${mail.from}<br>
          <strong>받는사람:</strong> ${mail.to}
        </div>
        <div class="mail-body">${mail.content}</div>
      </div>
    `;
  });

  document.getElementById('modal').style.display = 'flex';
}

function closeModal() {
  document.getElementById('modal').style.display = 'none';
}

renderList();
</script>

</body>
</html>
