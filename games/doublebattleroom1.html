<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Double Battle Room 1</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>

@import url('https://cdn.jsdelivr.net/gh/MonadABXY/mona-font/web/mona.css');

    /* ══ 인트로 오버레이 ══ */
    #intro-overlay {
      position: fixed; inset: 0; z-index: 1000;
      background: #000; overflow: hidden;
      transition: opacity 0.8s ease;
    }
    #intro-overlay.fade-out { opacity: 0; pointer-events: none; }
    #intro-overlay.hidden   { display: none; }

    #touch-screen {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
    }
    #touch-prompt {
      color: #fff; font-size: clamp(1rem,4vw,1.6rem);
      letter-spacing: 0.2em;
      animation: blink 1.4s ease-in-out infinite;
    }
    #touch-ready-status {
      margin-top: 2vh; color: rgba(255,255,255,0.45);
      font-size: clamp(0.7rem,2.5vw,1rem); letter-spacing: 0.1em;
    }
    @keyframes blink { 0%,100%{opacity:.2} 50%{opacity:1} }

    #vs-screen { position: absolute; inset: 0; display: none; }
    #vs-screen.show { display: block; }

    .vs-bg-line {
      position: absolute; width: 300%; height: 300%;
      background: repeating-linear-gradient(
        45deg, rgba(255,255,255,.08) 0px, rgba(255,255,255,.08) 2px,
        transparent 2px, transparent 25px);
      animation: moveBg .8s linear infinite;
    }
    @keyframes moveBg { from{transform:translate(0,0)} to{transform:translate(-300px,-300px)} }

    .vs-flash {
      position: absolute; width: 100%; height: 100%;
      background: white; opacity: 0; z-index: 5; pointer-events: none;
    }
    .vs-flash.show { animation: flashBoom .25s ease-out; }
    @keyframes flashBoom { 0%{opacity:1} 100%{opacity:0} }

    .vs-burst {
      position: absolute; top: 50%; left: 50%;
      width: clamp(20px,5vw,60px); height: clamp(20px,5vw,60px);
      border-radius: 50%; border: 4px solid rgba(255,255,255,.7);
      transform: translate(-50%,-50%) scale(0); z-index: 9; pointer-events: none;
    }
    .vs-burst.show { animation: burst .5s ease-out forwards; }
    @keyframes burst {
      0%   { transform:translate(-50%,-50%) scale(0); opacity:1; }
      100% { transform:translate(-50%,-50%) scale(8); opacity:0; }
    }

    .vs-slide {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 clamp(10px,5vw,80px); box-sizing: border-box;
    }
    .vs-left, .vs-right { width: 42%; color: white; opacity: 0; }
    .vs-left  { transform: translateX(-150%) scale(1.2); text-align: left; }
    .vs-right { transform: translateX( 150%) scale(1.2); text-align: right; }
    .vs-left.show  { animation: slideLeft  .4s cubic-bezier(.2,1.2,.3,1) forwards; }
    .vs-right.show { animation: slideRight .4s cubic-bezier(.2,1.2,.3,1) forwards; }
    @keyframes slideLeft  { 80%{transform:translateX(10%) scale(1.05);opacity:1} 100%{transform:translateX(0) scale(1);opacity:1} }
    @keyframes slideRight { 80%{transform:translateX(-10%) scale(1.05);opacity:1} 100%{transform:translateX(0) scale(1);opacity:1} }

    .vs-label {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%,-50%) scale(0);
      font-size: clamp(3rem,10vw,7rem); font-weight: bold;
      color: #ffcc00; text-shadow: 0 0 20px red, 0 0 60px orange;
      z-index: 10; pointer-events: none;
    }
    .vs-label.show { animation: vsImpact .4s cubic-bezier(.2,1.5,.3,1) forwards; }
    @keyframes vsImpact {
      0%  {transform:translate(-50%,-50%) scale(0)}
      60% {transform:translate(-50%,-50%) scale(1.6)}
      80% {transform:translate(-50%,-50%) scale(.9)}
      100%{transform:translate(-50%,-50%) scale(1)}
    }

    .vs-name     { font-size: clamp(1.2rem,4vw,2.8rem); font-weight: bold; letter-spacing: .15em; }
    .vs-name-sub { font-size: clamp(0.8rem,2.5vw,1.6rem); opacity: 0.8; letter-spacing: .1em; margin-top: 4px; }

    .vs-inner { display: inline-block; }
    .vs-shake { animation: vsShake .25s; }
    @keyframes vsShake {
      0%  {transform:translate(0,0)}   25%{transform:translate(-1vw,.5vh)}
      50% {transform:translate(1vw,-.5vh)} 75%{transform:translate(-.6vw,.3vh)}
      100%{transform:translate(0,0)}
    }
    .drift-left  { animation: driftLeft  20s linear infinite alternate; }
    .drift-right { animation: driftRight 20s linear infinite alternate; }
    @keyframes driftLeft  { from{transform:translateY(0)} to{transform:translateY(40px)} }
    @keyframes driftRight { from{transform:translateY(0)} to{transform:translateY(-40px)} }

    @media (max-width:430px) {
      .vs-slide { flex-direction:column; justify-content:center; gap:8vh; }
      .vs-left,.vs-right { width:100%; text-align:center; }
      .vs-left  { transform:translateY(-150%) scale(1.2); }
      .vs-right { transform:translateY( 150%) scale(1.2); }
      @keyframes slideLeft  { 80%{transform:translateY(10%) scale(1.05);opacity:1} 100%{transform:translateY(0) scale(1);opacity:1} }
      @keyframes slideRight { 80%{transform:translateY(-10%) scale(1.05);opacity:1} 100%{transform:translateY(0) scale(1);opacity:1} }
      @keyframes driftLeft  { from{transform:translateX(0)} to{transform:translateX(-40px)} }
      @keyframes driftRight { from{transform:translateX(0)} to{transform:translateX(40px)} }
    }

    body {
      background-color: #1a1a2e;
      background-size: cover; background-position: center; background-repeat: no-repeat;
      transition: background-image 0.5s ease;
      padding: 0; min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Mona12', sans-serif;
    }

    #battle-wrapper {
      background-color: #fff;
      width: 1020px; max-width: 99vw;
      padding: 16px; box-sizing: border-box;
      border: 1px solid #444; border-radius: 12px;
    }

    #battle-screen {
      display: flex; flex-direction: column; gap: 10px;
      opacity: 0; transition: opacity 0.8s ease;
    }

    /* ── 팀 라벨 ── */
    #team-labels {
      display: flex;
      justify-content: space-between;
      font-size: 12px; color: #888; padding: 0 4px;
    }

    /* ── 메인 4칼럼 ── */
    #battle-top {
      display: grid;
      grid-template-columns: 1fr 1fr 160px 2fr;
      gap: 10px;
      align-items: start;
    }

    .enemy-box {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      align-items: start;
    }

    /* ── 포켓몬 칼럼 ── */
    .pkmn-col {
      display: flex; flex-direction: column; gap: 6px;
    }

    .help-btn {
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    /* ── 가운데 ── */
    #center-col {
      display: flex; flex-direction: column;
      align-items: center; gap: 8px;
    }
    #turn-area { text-align: center; width: 100%; }
    #turn-display { font-size: 14px; font-weight: bold; color: #333; }
    #turn-count   { font-size: 11px; color: #888; margin-top: 2px; }

    /* 행동 순서 표시 */
    #order-display {
      display: flex; flex-direction: column;
      gap: 2px; width: 100%;
    }
    .order-item {
      font-size: 10px; color: #aaa;
      padding: 2px 6px; border-radius: 8px;
      text-align: center; white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis;
    }
    .order-item.active {
      background: #4caf50; color: #fff; font-weight: bold;
    }
    .order-item.mine {
      border: 1px solid #4caf50; color: #4caf50;
    }

    /* 주사위 */
    #dice-wrap {
      display: none; flex-direction: column;
      align-items: center; gap: 5px; width: 100%;
    }
    .dice-row { display: flex; gap: 10px; justify-content: center; }
    .dice-box { text-align: center; }
    .dice-box span { display: block; font-size: 9px; color: #888; margin-bottom: 1px; }
    .dice-num {
      font-size: 28px; font-weight: bold;
      color: #e63946; min-width: 32px; text-align: center;
    }
    .pop { animation: pop .1s ease-out; }
    @keyframes pop { 0%{transform:scale(1)} 40%{transform:scale(1.4)} 100%{transform:scale(1)} }

    /* ── HP 카드 ── */
    .hp-card {
      width: 100%;
      padding: 6px 12px 7px; box-sizing: border-box;
      border: 1.5px solid #555; border-radius: 14px;
      display: flex; flex-direction: column; gap: 4px;
      background: rgba(0,0,0,0.03);
    }
    .hp-card.my-card    { border-color: #4caf50; }
    .hp-card.ally-card  { border-color: #5185c5; }
    .hp-card.enemy-card { border-color: #e56c3e; }
    .hp-card-top { display: flex; justify-content: space-between; align-items: center; }
    .hp-card-name   { font-size: 11px; color: #333; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 58%; }
    .hp-card-number { font-size: 10px; color: #555; white-space: nowrap; }
    .hp-bar-wrap { width: 100%; background: rgba(0,0,0,0.12); border-radius: 999px; height: 5px; overflow: hidden; }
    .hp-bar { height: 100%; width: 100%; background: #4caf50; border-radius: 999px; transition: width .5s, background-color .4s; }

    /* ── 포트레이트 ── */
    .portrait-wrap { position: relative; width: 90px; height: 90px; flex-shrink: 0; }
    .portrait-wrap.enemy{margin-left: auto;}
    .portrait-placeholder { position: absolute; inset: 0; background: #282B42; border-radius: 5px; }
    .portrait-img {
      position: absolute; inset: 0; width: 100%; height: 100%;
      object-fit: contain; border-radius: 5px;
      display: none; opacity: 0; transition: opacity .35s;
    }
    .portrait-img.visible { display: block; opacity: 1; }

    /* ── 플레이어 라벨 ── */
    .section-label { font-size: 10px; color: #999; margin: 0 0 2px 1px;}
    .section-label.enemy {margin-left: auto;}

    /* ── 기술 버튼 ── */
    #move-buttons {
      display: grid; grid-template-columns: 1fr 1fr; gap: 5px;
    }
    #move-buttons button {
      height: 46px; padding: 0 8px;
      border-radius: 999px; border: none; color: white;
      cursor: pointer;
      --btn-color: #a0a0a0;
      background: var(--btn-color);
      box-shadow: inset 0 0 0 2px white, 0 0 0 2px var(--btn-color);
      text-shadow: 0 1px 2px rgba(0,0,0,.45);
      transition: filter .15s, transform .1s;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1px;
    }
    #move-buttons button:disabled { opacity: .4; cursor: not-allowed; }
    #move-buttons button:not(:disabled):hover  { filter: brightness(1.1); transform: scale(1.04); }
    #move-buttons button:not(:disabled):active { filter: brightness(.9); transform: scale(.97); }

    /* 타겟 선택 */
    #target-hint {
      display: none;
      font-size: 11px; color: #e67e22; text-align: center;
      padding: 4px; border: 1px dashed #e67e22; border-radius: 6px; margin-top: 2px;
    }
    .target-selectable { cursor: pointer !important; outline: 2px dashed #e63946; border-radius: 8px; }
    .target-selectable:hover { background: rgba(230,57,70,0.06); }

    /* ── 강제교체 안내 ── */
    #forced-switch-hint {
      display: none;
      font-size: 11px; color: #e67e22;
      padding: 4px 8px; border: 1px solid #e67e22; border-radius: 6px;
    }

    /* ── 교체 버튼 ── */
    #bench-container { display: flex; flex-direction: row; flex-wrap: wrap; gap: 5px; }
    #bench-container button {
      position: relative; width: 56px; height: 56px;
      background: transparent; border: none; cursor: pointer; color: #fff;
      text-shadow: 1px 1px 4px rgba(0,0,0,.9);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 2px; overflow: hidden; box-sizing: border-box;
    }
    #bench-container button::before {
      content:''; position: absolute; inset: 0;
      background-image: url('https://regular-azure-qtbkpkmn9y.edgeone.app/%EC%A0%9C%EB%AA%A9%20%EC%97%86%EC%9D%8C-5.png');
      background-size: contain; background-repeat: no-repeat; background-position: center;
      opacity: .35; transition: opacity .2s; pointer-events: none; z-index: 1;
    }
    #bench-container button:not(:disabled):hover::before { opacity: 1; }
    #bench-container button:disabled { opacity: .5; cursor: not-allowed; }
    #bench-container button.forced-switch { outline: 2px solid #e67e22; border-radius: 4px; }
    .bench-name { font-size: 9px; font-weight: bold; position: relative; z-index: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 85%; }
    .bench-hp   { font-size: 7px; opacity: .85; position: relative; z-index: 0; }

    /* ── 볼륨 컨트롤 ── */
    #volume-control {
      display: flex; align-items: center; gap: 6px; margin-top: 6px;
    }

    /* ── 팀 채팅 ── */
    #chat-section {
      border: 1px solid #ddd; border-radius: 8px; overflow: hidden;
    }
    #chat-channel-label {
      font-size: 11px; color: #888; padding: 4px 8px;
      background: #f5f5f5; border-bottom: 1px solid #eee;
    }
    #chat-messages {
      height: 90px; overflow-y: auto;
      padding: 5px 8px; font-size: 12px; line-height: 1.5;
    }
    .chat-message { margin: 1px 0; }
    .chat-nick    { font-weight: bold; color: #555; }
    .chat-action  { color: #999; font-style: italic; }
    #chat-input-row { display: flex; border-top: 1px solid #eee; }
    #chat-input {
      flex: 1; border: none; padding: 5px 8px;
      font-size: 12px; outline: none; font-family: inherit;
    }
    #chat-send-btn {
      border: none; background: #4caf50; color: #fff;
      padding: 0 12px; cursor: pointer; font-size: 12px;
    }
    #chat-send-btn:hover { background: #45a049; }

    /* ── 관전자 채팅 ── */
  
    .spectator-chat-box {
      border-radius: 8px; overflow: hidden;
    }
    .spectator-chat-box.team-a { border: 1px solid #5185c5; }
    .spectator-chat-box.team-b { border: 1px solid #e56c3e; }
    .spectator-chat-label {
      font-size: 11px; padding: 4px 8px; border-bottom: 1px solid;
    }
    .spectator-chat-box.team-a .spectator-chat-label {
      color: #5185c5; background: #f0f4ff; border-color: #d0d8f0;
    }
    .spectator-chat-box.team-b .spectator-chat-label {
      color: #e56c3e; background: #fff4f0; border-color: #f0d0c8;
    }
    .spectator-chat-messages {
      height: 90px; overflow-y: auto;
      padding: 5px 8px; font-size: 12px; line-height: 1.5;
    }

    /* ── ASSIST! 애니메이션 ── */
    #assist-anim {
      position: fixed;
      top: 40%; left: 50%;
      transform: translate(-50%, -50%);
      font-size: clamp(40px, 8vw, 72px);
      font-weight: 900; color: #fff; letter-spacing: 4px;
      text-shadow: 0 0 10px #00eaff, 0 0 20px #00eaff, 0 0 40px #00eaff;
      opacity: 0; pointer-events: none; z-index: 9999;
      font-family: 'Mona12', sans-serif;
    }
    .assist-show { animation: juicyAssist 1.2s cubic-bezier(.2,1.5,.5,1) forwards; }
    @keyframes juicyAssist {
      0%   { transform: translate(-50%, -50%) translateX(-500px) scale(0.6) skew(-10deg); opacity: 0; }
      30%  { transform: translate(-50%, -50%) translateX(0) scale(1.3) skew(-10deg); opacity: 1; }
      45%  { transform: translate(-50%, -50%) translateX(0) scale(1.1) skew(-10deg); }
      60%  { transform: translate(-50%, -50%) translateX(0) scale(1.2) skew(-10deg); opacity: 1; }
      80%  { transform: translate(-50%, -50%) translateX(0) scale(1.2) skew(-10deg); opacity: 1; }
      100% { transform: translate(-50%, -50%) translateX(0) scale(1.8) skew(-10deg); opacity: 0; }
    }

    /* ── SYNCHRONIZE! 애니메이션 ── */
    #sync-anim {
      position: fixed;
      top: 58%; left: 50%;
      transform: translate(-50%, -50%);
      font-size: clamp(22px, 4vw, 44px);
      font-weight: 900; color: #fff; letter-spacing: 3px;
      text-shadow: 0 0 10px #b44fff, 0 0 20px #b44fff, 0 0 40px #b44fff;
      opacity: 0; pointer-events: none; z-index: 9999;
      font-family: 'Mona12', sans-serif;
    }
    .sync-show { animation: juicySync 1.2s cubic-bezier(.2,1.5,.5,1) forwards; }
    @keyframes juicySync {
      0%   { transform: translate(-50%, -50%) translateX(-500px) scale(0.6) skew(-10deg); opacity: 0; }
      30%  { transform: translate(-50%, -50%) translateX(0) scale(1.3) skew(-10deg); opacity: 1; }
      45%  { transform: translate(-50%, -50%) translateX(0) scale(1.1) skew(-10deg); }
      60%  { transform: translate(-50%, -50%) translateX(0) scale(1.2) skew(-10deg); opacity: 1; }
      80%  { transform: translate(-50%, -50%) translateX(0) scale(1.2) skew(-10deg); opacity: 1; }
      100% { transform: translate(-50%, -50%) translateX(0) scale(1.8) skew(-10deg); opacity: 0; }
    }

    /* ── 어시스트 ── */
    #assist-section { display: flex; flex-direction: column; }
    #assist-request-btn {
      padding: 5px 10px; font-size: 11px; border-radius: 6px;
      border: 1.5px solid #3498db; background: transparent;
      color: #3498db; cursor: pointer; font-family: inherit;
      transition: background .15s, color .15s;
    }
    #assist-request-btn:not(:disabled):hover { background: #3498db; color: #fff; }
    #assist-request-btn:disabled { opacity: .5; cursor: not-allowed; }
    #assist-status { font-size: 10px; min-height: 14px; }
    #assist-popup {
      z-index: 100; top: 100%;
      font-size: 11px; padding: 6px 8px;
      border: 1px solid #e67e22; border-radius: 6px;
      background: #fff8f0; display: flex; flex-direction: column; gap: 4px;
    }
    #assist-popup button {
      padding: 3px 8px; font-size: 11px; border-radius: 4px;
      border: none; cursor: pointer; font-family: inherit;
    }
    #assist-popup button:first-of-type { background: #27ae60; color: #fff; }
    #assist-popup button:last-of-type  { background: #e74c3c; color: #fff; }

    /* ── 싱크로나이즈 ── */
    #sync-section { display: flex; flex-direction: column; }
    #sync-request-btn {
      padding: 5px 10px; font-size: 11px; border-radius: 6px;
      border: 1.5px solid #9b59b6; background: transparent;
      color: #9b59b6; cursor: pointer; font-family: inherit;
      transition: background .15s, color .15s;
    }
    #sync-request-btn:not(:disabled):hover { background: #9b59b6; color: #fff; }
    #sync-request-btn:disabled { opacity: .5; cursor: not-allowed; }
    #sync-status { font-size: 10px; min-height: 14px; }
    #sync-popup {
      z-index: 100; top: 100%;
      font-size: 11px; padding: 6px 8px;
      border: 1px solid #9b59b6; border-radius: 6px;
      background: #f9f0ff; display: flex; flex-direction: column; gap: 4px;
    }
    #sync-popup button {
      padding: 3px 8px; font-size: 11px; border-radius: 4px;
      border: none; cursor: pointer; font-family: inherit;
    }
    #sync-popup button:first-of-type { background: #27ae60; color: #fff; }
    #sync-popup button:last-of-type  { background: #e74c3c; color: #fff; }

    /* ── 넉백 / 이펙트 ── */
    .defender-hit { animation: defenderHit 0.35s ease; }
    @keyframes defenderHit {
      0%  { transform: translateX(0); }
      20% { transform: translateX(-14px); }
      45% { transform: translateX(11px); }
      65% { transform: translateX(-8px); }
      85% { transform: translateX(5px); }
      100%{ transform: translateX(0); }
    }
    .blink-damage { animation: blinkDamage .18s steps(1) 3; }
    @keyframes blinkDamage { 0%,100%{opacity:1} 50%{opacity:0} }
    .screen-shake { animation: screenShake 0.3s ease; }
    @keyframes screenShake {
      0%  { transform: translate(0,0); }
      20% { transform: translate(-3px,1px); }
      40% { transform: translate(3px,-1px); }
      60% { transform: translate(-2px,1px); }
      80% { transform: translate(2px,-1px); }
      100%{ transform: translate(0,0); }
    }
    .battle-popup {
      position: absolute; left:50%; top:50%;
      transform: translate(-50%,-50%) scale(.9);
      font-size: 20px; font-weight: 900;
      pointer-events: none; opacity: 0; z-index: 10; white-space: nowrap;
    }
    .battle-popup.critical { color:#ff3b3b; text-shadow:0 0 6px #f00; }
    .battle-popup.evade    { color:#2ecc71; text-shadow:0 0 6px #0f8; }
    @keyframes popSimple {
      0%  { opacity:0; transform:translate(-50%,-50%) scale(.9) translateY(4px); }
      20% { opacity:1; transform:translate(-50%,-50%) scale(1.15) translateY(0); }
      100%{ opacity:0; transform:translate(-50%,-50%) scale(1) translateY(-10px); }
    }
    .battle-popup.show { animation: popSimple .7s ease-out forwards; }

    #battle-bottom { display: flex; flex-direction: column; gap: 6px; margin-top: 10px; }
    #battle-log {
      width: 100%; height: 140px; overflow-y: auto;
      border: 1px solid #444; border-radius: 6px;
      padding: 8px; font-size: 13px; box-sizing: border-box; line-height: 1.6;
    }
    #battle-log p { margin: 2px 0; }
    #spectator-list { font-size: 11px; color: #888; padding: 4px 6px; }

    #leaveBtn {
      display: none; padding: 7px 16px; margin-top: 4px;
      background: #c0392b; color: #fff; border: none;
      border-radius: 6px; font-size: 13px; cursor: pointer; font-weight: bold;
    }
    #leaveBtn:hover { background: #e74c3c; }

    /* ── 공격 다이스 표시 ── */
    #attack-dice-display {
      position: fixed; bottom: 30%; right: 20px;
      font-size: clamp(28px, 5vw, 56px); font-weight: 900;
      color: #e63946; text-shadow: 0 0 10px rgba(230,57,70,0.5);
      opacity: 0; pointer-events: none; z-index: 9998;
      font-family: 'Mona12', sans-serif;
    }

    /* ══════════════
       모바일 반응형
    ══════════════ */
    @media (max-width: 640px) {
      @keyframes screenShake {
        0%  { transform: translate(0,0); }
        20% { transform: translate(-2px,1px); }
        40% { transform: translate(2px,-1px); }
        60% { transform: translate(-1px,1px); }
        80% { transform: translate(1px,-1px); }
        100%{ transform: translate(0,0); }
      }
      body { align-items: flex-start; }
      #battle-wrapper {
        border-radius: 0;
        border-left: none; border-right: none;
        min-height: 100dvh;
        width: 100%; max-width: 100%;
        padding: 8px 6px 24px;
      }
      #battle-top {
        grid-template-columns: 1fr 1fr;
        gap: 6px;
      }
      .enemy-section { display: contents; }
      .enemy-box     { display: contents; }
      .pkmn-col.enemy1 { order: 0; grid-column: 1; }
      .pkmn-col.enemy2 { order: 0; grid-column: 2; }
      .pkmn-col.my     { order: 2; grid-column: 1; }
      .pkmn-col.ally   { order: 2; grid-column: 2; }
      #center-col {
        grid-column: 1 / -1;
        order: 1;
        flex-direction: row;
        justify-content: space-between;
        align-items: center;
        gap: 6px;
        flex-wrap: wrap;
      }
      #order-display { flex-direction: row; flex-wrap: wrap; justify-content: center; gap: 3px; }
      #turn-area { flex-shrink: 0; }
      .pkmn-col.my   { order: 2; }
      .pkmn-col.ally { order: 3; }
      .portrait-wrap { width: 72px; height: 72px; }
      .portrait-wrap.enemy { margin-left: 0; margin-right: 0; }
      #move-buttons { margin-top: 4px; }
      #move-buttons button { height: 44px; font-size: 11px; }
      .help-btn { flex-direction: row; flex-wrap: wrap; gap: 4px; }
      #assist-section, #sync-section { flex: 1; min-width: 0; }
      #assist-request-btn, #sync-request-btn { width: 100%; font-size: 10px; padding: 4px 6px; }
      #battle-log { height: 90px; font-size: 11px; }
      #chat-section { margin-top: 4px; }
      #chat-messages { height: 60px; }
      .spectator-chat-messages { height: 70px; }
      .enemy-box { grid-template-columns: 1fr 1fr; gap: 6px; }
      .section-label.enemy { margin-left: 0; }
      .dice-num { font-size: 22px; }
      #battle-bottom { grid-column: 1 / -1; order: 5; margin-top: 6px; }
      #spectator-chat-section { margin-top: 4px; }
    }

  </style>
</head>
<body>

  <!-- ══ 인트로 오버레이 ══ -->
  <div id="intro-overlay">
    <div id="touch-screen">
      <div id="touch-prompt">아무데나 터치하여 시작!</div>
      <div id="touch-ready-status"></div>
    </div>
    <div id="vs-screen">
      <div class="vs-bg-line"></div>
      <div class="vs-flash"  id="vs-flash"></div>
      <div class="vs-burst"  id="vs-burst"></div>
      <div class="vs-slide">
        <div class="vs-left" id="vs-left">
          <div class="vs-inner" id="vs-inner-left">
            <div class="vs-name" id="vs-name-left">PLAYER1</div>
            <div class="vs-name-sub" id="vs-name-sub-left">&amp; PLAYER2</div>
          </div>
        </div>
        <div class="vs-right" id="vs-right">
          <div class="vs-inner" id="vs-inner-right">
            <div class="vs-name" id="vs-name-right">PLAYER3</div>
            <div class="vs-name-sub" id="vs-name-sub-right">&amp; PLAYER4</div>
          </div>
        </div>
      </div>
      <div class="vs-label" id="vs-label">VS</div>
    </div>
  </div>

  <!-- ══ 배틀 화면 ══ -->
  <div id="battle-wrapper">
    <div id="assist-anim">ASSIST!</div>
    <div id="sync-anim">SYNCHRONIZE!</div>
    <div id="attack-dice-display"></div>
    <div id="battle-screen">

      <!-- 팀 라벨 -->
      <div id="team-labels"></div>

      <!-- 5칼럼 배틀 영역 -->
      <div id="battle-top">

        <!-- 내 포켓몬 -->
        <div class="pkmn-col my" id="my-pokemon-area">
          <p class="section-label" id="my-name-label">-</p>
          <div class="portrait-wrap">
            <div class="portrait-placeholder" id="my-portrait-placeholder"></div>
            <img id="my-portrait" class="portrait-img" alt="">
          </div>
          <div class="hp-card my-card">
            <div class="hp-card-top">
              <span class="hp-card-name" id="my-active-name">-</span>
              <span class="hp-card-number" id="my-active-hp"></span>
            </div>
            <div class="hp-bar-wrap"><div class="hp-bar" id="my-hp-bar"></div></div>
          </div>
          <div>
            <div id="move-buttons">
              <button id="move-btn-0" disabled>-</button>
              <button id="move-btn-1" disabled>-</button>
              <button id="move-btn-2" disabled>-</button>
              <button id="move-btn-3" disabled>-</button>
            </div>
            <div id="target-hint">⚔ 공격할 상대를 클릭!</div>
          </div>
          <div>
            <p class="section-label">교체</p>
            <div id="forced-switch-hint">⚠ 교체할 포켓몬을 선택!</div>
            <div id="bench-container"></div>
          </div>
          <button id="leaveBtn">방 나가기</button>
        </div>

        <!-- 아군 포켓몬 -->
        <div class="pkmn-col ally" id="ally-pokemon-area">
          <p class="section-label" id="ally-name-label">-</p>
          <div class="portrait-wrap">
            <div class="portrait-placeholder" id="ally-portrait-placeholder"></div>
            <img id="ally-portrait" class="portrait-img" alt="">
          </div>
          <div class="hp-card ally-card">
            <div class="hp-card-top">
              <span class="hp-card-name" id="ally-active-name">-</span>
              <span class="hp-card-number" id="ally-active-hp"></span>
            </div>
            <div class="hp-bar-wrap"><div class="hp-bar" id="ally-hp-bar"></div></div>
          </div>
          <div class="help-btn">
            <div id="assist-section">
              <button id="assist-request-btn" onclick="window.__doRequestAssist()">지원 요청</button>
              <div id="assist-status"></div>
              <div id="assist-popup" style="display:none">
                <span id="assist-popup-name"></span>님의 지원 요청
                <button onclick="window.__doAcceptAssist()">수락</button>
                <button onclick="window.__doRejectAssist()">거절</button>
              </div>
            </div>
            <div id="sync-section">
              <button id="sync-request-btn" onclick="window.__doRequestSync()">동기화 요청</button>
              <div id="sync-status"></div>
              <div id="sync-popup" style="display:none">
                <span id="sync-popup-name"></span>님의 동기화 요청
                <button onclick="window.__doAcceptSync()">수락</button>
                <button onclick="window.__doRejectSync()">거절</button>
              </div>
            </div>
          </div>
        </div>

        <!-- 가운데: 턴 + 순서 + 주사위 -->
        <div id="center-col">
          <div id="turn-area">
            <div id="turn-display">대기 중...</div>
            <div id="turn-count"></div>
          </div>
          <div id="order-display"></div>
          <div id="dice-wrap">
            <div class="dice-row">
              <div class="dice-box" id="dice-box-p1">
                <span id="p1-name-label">P1</span>
                <div class="dice-num" id="dice-p1">?</div>
              </div>
              <div class="dice-box" id="dice-box-p2">
                <span id="p2-name-label">P2</span>
                <div class="dice-num" id="dice-p2">?</div>
              </div>
            </div>
            <div class="dice-row">
              <div class="dice-box" id="dice-box-p3">
                <span id="p3-name-label">P3</span>
                <div class="dice-num" id="dice-p3">?</div>
              </div>
              <div class="dice-box" id="dice-box-p4">
                <span id="p4-name-label">P4</span>
                <div class="dice-num" id="dice-p4">?</div>
              </div>
            </div>
          </div>
        </div>

        <!-- 적 1 + 적 2 + 배틀 로그 -->
        <div class="enemy-section">
          <div class="enemy-box">
            <div class="pkmn-col enemy1" id="enemy1-pokemon-area">
              <p class="section-label enemy" id="enemy1-name-label">-</p>
              <div class="portrait-wrap enemy">
                <div class="portrait-placeholder" id="enemy1-portrait-placeholder"></div>
                <img id="enemy1-portrait" class="portrait-img" alt="">
              </div>
              <div class="hp-card enemy-card">
                <div class="hp-card-top">
                  <span class="hp-card-name" id="enemy1-active-name">-</span>
                  <span class="hp-card-number" id="enemy1-active-hp"></span>
                </div>
                <div class="hp-bar-wrap"><div class="hp-bar" id="enemy1-hp-bar"></div></div>
              </div>
            </div>
            <div class="pkmn-col enemy2" id="enemy2-pokemon-area">
              <p class="section-label enemy" id="enemy2-name-label">-</p>
              <div class="portrait-wrap enemy">
                <div class="portrait-placeholder" id="enemy2-portrait-placeholder"></div>
                <img id="enemy2-portrait" class="portrait-img" alt="">
              </div>
              <div class="hp-card enemy-card">
                <div class="hp-card-top">
                  <span class="hp-card-name" id="enemy2-active-name">-</span>
                  <span class="hp-card-number" id="enemy2-active-hp"></span>
                </div>
                <div class="hp-bar-wrap"><div class="hp-bar" id="enemy2-hp-bar"></div></div>
              </div>
            </div>
          </div>
          <div id="battle-bottom">
            <p class="section-label">배틀 로그</p>
            <div id="battle-log"></div>
            <div id="spectator-list"></div>
            <div id="volume-control">
              <span style="font-size:11px; color:#999;">🎵</span>
              <input type="range" id="bgm-volume" min="0" max="1" step="0.05" value="0.7"
                style="flex:1; accent-color:#555; cursor:pointer;">
              <span id="bgm-volume-label" style="font-size:11px; color:#999; min-width:28px;">70%</span>
            </div>
          </div>
        </div>

      </div><!-- /battle-top -->

     <!-- 팀 플레이어용 채팅 -->
      <div id="chat-section">
        <div id="chat-channel-label">채팅</div>
        <div id="chat-messages"></div>
        <div id="chat-input-row">
          <input id="chat-input" type="text" placeholder="동료에게..." maxlength="200">
          <button id="chat-send-btn">전송</button>
        </div>
      </div>

      <!-- 관전자 전용: 양 팀 채팅 동시 관람 + 관전자 채팅 -->
      <div id="spectator-chat-section" style="display:none">
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px;">
          <div class="spectator-chat-box team-a">
            <div class="spectator-chat-label">🔵 팀A 채팅</div>
            <div class="spectator-chat-messages" id="spectator-chat-a"></div>
          </div>
          <div class="spectator-chat-box team-b">
            <div class="spectator-chat-label">🔴 팀B 채팅</div>
            <div class="spectator-chat-messages" id="spectator-chat-b"></div>
          </div>
        </div>
        <div style="border:1px solid #ddd; border-radius:8px; overflow:hidden; margin-top:8px;">
          <div style="font-size:11px; color:#888; padding:4px 8px; background:#f5f5f5; border-bottom:1px solid #eee;">👁 관전자 채팅</div>
          <div id="spectator-chat-messages" style="height:70px; overflow-y:auto; padding:5px 8px; font-size:12px; line-height:1.5;"></div>
          <div style="display:flex; border-top:1px solid #eee;">
            <input id="spectator-chat-input" type="text" placeholder="관전자 채팅..." maxlength="200"
              style="flex:1; border:none; padding:5px 8px; font-size:12px; outline:none; font-family:inherit;">
            <button id="spectator-chat-send-btn"
              style="border:none; background:#888; color:#fff; padding:0 12px; cursor:pointer; font-size:12px;">전송</button>
          </div>
        </div>
      </div>
    </div><!-- /battle-screen -->
  </div><!-- /battle-wrapper -->

  <script>const ROOM_ID = "doublebattleroom1"</script>
  <script type="module" src="../js/chat.js"></script>
  <script type="module" src="../js/doubleintro.js"></script>
  <script type="module" src="../js/doublebattle.js"></script>
</body>
</html>
