<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: sans-serif;
            background-color: #fff;
            color: #111;

            display: flex;
            justify-content: center;
            align-items: center;

            min-height: 100vh;
        }

        .container {
            text-align: center;
            padding: 20px;
        }

        .title {
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 16px;
        }

        .notice {
            font-size: 1.2rem;
            opacity: 0.8;
        }

        /* 모바일 대응 */
        @media (max-width: 480px) {
            .title {
                font-size: 2rem;
            }

            .notice {
                font-size: 1rem;
            }
        }
    </style>
    <title>바보의 방</title>
</head>
<body>

    <div class="container">
        <div class="title">바보의 방</div>
        <div class="notice">
            너... 바보야?
        </div>
    </div>
    
</body>
</html>
