<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Raid Lobby</title>
  <style>
    :root {
      --bg: #101215;
      --panel: rgba(255,255,255,0.06);
      --line: rgba(255,255,255,0.12);
      --text: #f3f4f6;
      --muted: #a8b0bb;
      --accent: #d3b57a;
      --accent-soft: rgba(211,181,122,0.15);
      --shadow: 0 24px 60px rgba(0,0,0,0.35);
      --radius: 22px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(211,181,122,0.08), transparent 28%),
        radial-gradient(circle at bottom right, rgba(255,255,255,0.05), transparent 20%),
        linear-gradient(160deg, #0b0d10 0%, #14181d 55%, #0d1116 100%);
      display: grid;
      place-items: start center;
      padding: 24px;
    }

    .app {
      width: min(1180px, 100%);
      display: grid;
      grid-template-columns: 1.15fr 0.85fr;
      gap: 20px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      backdrop-filter: blur(14px);
      box-shadow: var(--shadow);
    }

    /* ── 보드 ── */
    .board { padding: 24px; position: relative; overflow: hidden; }

    .board::before {
      content: "RAID LOBBY";
      position: absolute; top: 18px; right: 20px;
      font-size: 11px; letter-spacing: 0.28em;
      color: rgba(255,255,255,0.14);
    }

    .board-header {
      display: flex; justify-content: space-between;
      align-items: end; gap: 12px; margin-bottom: 20px;
    }

    .eyebrow {
      font-size: 12px; color: var(--accent);
      letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 8px;
    }

    h1 { font-size: clamp(22px, 3vw, 36px); line-height: 1.05; }
    .sub { margin: 8px 0 0; color: var(--muted); font-size: 14px; line-height: 1.6; }

    .status-badge {
      padding: 10px 14px; border-radius: 999px;
      background: var(--accent-soft);
      border: 1px solid rgba(211,181,122,0.22);
      font-size: 12px; color: #f4dec0;
      white-space: nowrap; flex-shrink: 0;
    }

    /* ── 맵 ── */
    .map {
      position: relative; min-height: 560px; border-radius: 18px;
      background:
        linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px),
        radial-gradient(circle at 30% 25%, rgba(255,255,255,0.06), transparent 22%),
        linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01));
      background-size: 34px 34px, 34px 34px, auto, auto;
      border: 1px solid rgba(255,255,255,0.08);
      overflow: hidden;
    }

    .map::after {
      content: "구역 선택";
      position: absolute; left: 18px; bottom: 16px;
      font-size: 12px; color: rgba(255,255,255,0.24); letter-spacing: 0.12em;
    }

    .zone {
      position: absolute;
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.03);
      border-radius: 18px; cursor: pointer;
      transition: transform 180ms ease, border-color 180ms ease,
                  background 180ms ease, box-shadow 180ms ease;
      padding: 16px; text-align: left; color: var(--text);
    }

    .zone:hover {
      transform: translateY(-2px);
      border-color: rgba(211,181,122,0.45);
      background: rgba(211,181,122,0.08);
      box-shadow: 0 10px 24px rgba(0,0,0,0.2);
    }

    .zone.selected {
      border-color: var(--accent);
      background: rgba(211,181,122,0.14);
      box-shadow: 0 14px 32px rgba(0,0,0,0.28);
    }

    .zone-label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; }
    .zone-title { font-size: 18px; font-weight: 700; line-height: 1.2; }
    .zone-boss  { display: block; font-size: 11px; color: var(--accent); margin-top: 5px; opacity: 0.85; }

    .zone-a { top: 6%;  left: 6%;   width: 38%; height: 30%; }
    .zone-b { top: 8%;  right: 5%;  width: 30%; height: 28%; }
    .zone-c { bottom: 8%; left: 14%; width: 54%; height: 24%; }

    .pins { position: absolute; inset: 0; pointer-events: none; }
    .pin {
      position: absolute; width: 10px; height: 10px; border-radius: 50%;
      background: var(--accent); box-shadow: 0 0 0 8px rgba(211,181,122,0.08); opacity: 0.8;
    }

    /* ── 모바일 탭 ── */
    .zone-tabs { display: none; }

    /* ── 우측 패널 ── */
    .details { padding: 24px; display: flex; flex-direction: column; gap: 14px; }

    .details-top {
      display: flex; justify-content: space-between;
      align-items: start; gap: 12px;
    }

    .details h2 { font-size: 26px; margin: 6px 0 8px; }
    .details-desc { color: var(--muted); font-size: 14px; line-height: 1.7; }

    .tag {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 12px; border-radius: 999px; font-size: 12px;
      border: 1px solid var(--line); background: rgba(255,255,255,0.04);
      color: var(--muted); flex-shrink: 0;
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }

    .section {
      padding: 18px; border-radius: 18px;
      border: 1px solid var(--line); background: rgba(255,255,255,0.03);
    }
    .section-title {
      font-size: 12px; letter-spacing: 0.16em;
      text-transform: uppercase; color: var(--accent); margin-bottom: 10px;
    }

    .facts { display: grid; gap: 10px; }
    .fact {
      display: flex; justify-content: space-between; gap: 12px;
      padding-bottom: 10px; border-bottom: 1px dashed rgba(255,255,255,0.08);
      font-size: 14px;
    }
    .fact:last-child { border-bottom: 0; padding-bottom: 0; }
    .fact strong { color: #fff; }

    /* ── 플레이어 슬롯 ── */
    .player-slots { display: grid; gap: 8px; }

    .player-slot {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px; border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.02); font-size: 14px;
    }

    .slot-left { display: flex; align-items: center; gap: 10px; }
    .slot-num { font-size: 11px; color: var(--muted); min-width: 20px; }
    .slot-name { color: var(--text); }
    .slot-name.empty { color: rgba(255,255,255,0.25); font-style: italic; }

    .ready-chip {
      font-size: 12px; padding: 3px 10px; border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--muted); background: rgba(255,255,255,0.04);
      transition: all 0.2s;
    }
    .ready-chip.on {
      border-color: rgba(211,181,122,0.4);
      color: var(--accent); background: var(--accent-soft);
    }

    #spectator-list {
      font-size: 12px; color: rgba(255,255,255,0.3); text-align: center;
    }

    /* ── 버튼 ── */
    .btn-area { display: flex; gap: 10px; flex-wrap: wrap; margin-top: auto; }

    .btn {
      flex: 1; padding: 14px; border-radius: 12px;
      background: rgba(255,255,255,0.08); color: var(--text);
      font-family: inherit; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: 0.2s; min-width: 80px;
      border: 1px solid rgba(255,255,255,0.12);
    }
    .btn:hover   { background: rgba(255,255,255,0.13); }
    .btn:active  { transform: scale(0.98); }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

    .btn-ready {
      background: var(--accent-soft);
      border-color: rgba(211,181,122,0.35);
      color: #f4dec0;
    }
    .btn-ready:hover   { background: rgba(211,181,122,0.25); }
    .btn-ready:disabled { background: rgba(211,181,122,0.08); }

    .zone-hint {
      font-size: 12px; color: rgba(211,181,122,0.6);
      text-align: center; min-height: 16px;
    }

    /* ── 어드민 패널 ── */
    #admin-panel {
      display: none; border: 1px solid rgba(155,89,182,0.4);
      border-radius: 14px; padding: 14px;
      background: rgba(155,89,182,0.06);
    }
    #admin-panel-title {
      font-size: 11px; font-weight: 700; color: #9b59b6;
      letter-spacing: 0.08em; margin-bottom: 8px;
    }
    #admin-hint { font-size: 11px; color: var(--muted); margin-bottom: 8px; min-height: 14px; }
    #admin-player-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; }

    .admin-slot-btn {
      display: flex; flex-direction: column; align-items: flex-start;
      padding: 8px 10px; border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px; background: rgba(255,255,255,0.03);
      cursor: pointer; transition: 0.15s; text-align: left;
    }
    .admin-slot-btn:hover       { border-color: #9b59b6; background: rgba(155,89,182,0.08); }
    .admin-slot-btn.selected    { border-color: #9b59b6; background: rgba(155,89,182,0.15); }
    .admin-slot-btn.empty       { opacity: 0.35; cursor: default; }
    .admin-slot-btn.empty:hover { border-color: rgba(255,255,255,0.1); background: rgba(255,255,255,0.03); }
    .admin-slot-label { font-size: 10px; color: var(--muted); font-weight: 600; margin-bottom: 2px; }
    .admin-slot-name  { font-size: 12px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 90px; }

    /* ── 반응형 ── */
    @media (max-width: 980px) {
      .app { grid-template-columns: 1fr; }
      .map { min-height: 420px; }
    }

    @media (max-width: 480px) {
      body { padding: 12px; }
      .board, .details { padding: 16px; }
      .board::before { display: none; }
      .board-header { flex-direction: column; align-items: flex-start; gap: 10px; }
      .map { display: none; }

      .zone-tabs {
        display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 4px;
      }
      .zone-tab {
        flex: 1 1 calc(33.333% - 8px); min-width: 80px;
        padding: 10px 8px; border-radius: 14px;
        border: 1px solid rgba(255,255,255,0.14);
        background: rgba(255,255,255,0.03);
        color: var(--text); font-family: inherit;
        font-size: 13px; font-weight: 600;
        cursor: pointer; text-align: center;
        transition: border-color 160ms, background 160ms;
      }
      .zone-tab .tab-label { display: block; font-size: 10px; color: var(--muted); margin-bottom: 3px; font-weight: 400; }
      .zone-tab:hover    { border-color: rgba(211,181,122,0.45); background: rgba(211,181,122,0.08); }
      .zone-tab.selected { border-color: var(--accent); background: rgba(211,181,122,0.12); color: #f4dec0; }

      .details h2 { font-size: 20px; }
      .details-top { flex-direction: column; align-items: flex-start; gap: 8px; }
      .section { padding: 14px; border-radius: 14px; }
      .btn { padding: 12px; }
    }
  </style>
</head>
<body>
<main class="app">

  <!-- 왼쪽 보드 -->
  <section class="card board">
    <div class="board-header">
      <div>
        <div class="eyebrow">Raid Lobby</div>
        <h1>구역을 선택하세요</h1>
        <p class="sub">탐험할 구역을 고르고 레디하면 레이드가 시작돼.</p>
      </div>
      <div class="status-badge" id="selected-badge">미선택</div>
    </div>

    <!-- 모바일 탭 -->
    <div class="zone-tabs" id="zone-tabs">
      <button class="zone-tab" data-zone="A">
        <span class="tab-label">구역 A</span>설원
      </button>
      <button class="zone-tab" data-zone="B">
        <span class="tab-label">구역 B</span>화산
      </button>
      <button class="zone-tab" data-zone="C">
        <span class="tab-label">구역 C</span>심해
      </button>
    </div>

    <!-- 데스크탑 맵 -->
    <div class="map">
      <button class="zone zone-a" data-zone="A">
        <span class="zone-label">구역 A</span>
        <span class="zone-title">설원</span>
        <span class="zone-boss">vs 빙룡</span>
      </button>
      <button class="zone zone-b" data-zone="B">
        <span class="zone-label">구역 B</span>
        <span class="zone-title">화산</span>
        <span class="zone-boss">vs 염룡</span>
      </button>
      <button class="zone zone-c" data-zone="C">
        <span class="zone-label">구역 C</span>
        <span class="zone-title">심해</span>
        <span class="zone-boss">vs 해룡</span>
      </button>

      <div class="pins" aria-hidden="true">
        <span class="pin" style="top:18%; left:24%;"></span>
        <span class="pin" style="top:20%; left:81%;"></span>
        <span class="pin" style="bottom:18%; left:50%;"></span>
      </div>
    </div>
  </section>

  <!-- 오른쪽 패널 -->
  <aside class="card details">
    <div class="details-top">
      <div>
        <div class="eyebrow">Selected Zone</div>
        <h2 id="detail-title">—</h2>
        <p class="details-desc" id="detail-desc">구역을 선택하면 상세 정보가 표시돼.</p>
      </div>
      <div class="tag"><span class="dot"></span><span id="detail-difficulty">—</span></div>
    </div>

    <div class="section">
      <div class="section-title">구역 정보</div>
      <div class="facts">
        <div class="fact"><span>보스</span><strong id="f-boss">—</strong></div>
        <div class="fact"><span>난이도</span><strong id="f-diff">—</strong></div>
        <div class="fact"><span>특징</span><strong id="f-trait">—</strong></div>
        <div class="fact"><span>추천 타입</span><strong id="f-type">—</strong></div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">참가자</div>
      <div class="player-slots">
        <div class="player-slot">
          <div class="slot-left">
            <span class="slot-num">P1</span>
            <span class="slot-name empty" id="player1">대기 중...</span>
          </div>
          <span class="ready-chip" id="player1-ready">대기</span>
        </div>
        <div class="player-slot">
          <div class="slot-left">
            <span class="slot-num">P2</span>
            <span class="slot-name empty" id="player2">대기 중...</span>
          </div>
          <span class="ready-chip" id="player2-ready">대기</span>
        </div>
        <div class="player-slot">
          <div class="slot-left">
            <span class="slot-num">P3</span>
            <span class="slot-name empty" id="player3">대기 중...</span>
          </div>
          <span class="ready-chip" id="player3-ready">대기</span>
        </div>
      </div>
    </div>

    <div id="spectator-list">관전자 없음</div>
    <div class="zone-hint" id="zone-hint"></div>

    <div class="btn-area">
      <button class="btn btn-ready" id="readyBtn" style="display:none">Ready</button>
      <button class="btn" id="swapBtn" style="display:none">자리 이동</button>
      <button class="btn" id="leaveBtn">Leave</button>
    </div>

    <div id="admin-panel">
      <div id="admin-panel-title">🔧 ADMIN — 강제 자리 교체</div>
      <div id="admin-hint">교체할 플레이어를 선택하세요</div>
      <div id="admin-player-grid"></div>
    </div>
  </aside>

</main>

<script>const ROOM_ID = "raidroom2"</script>
<script type="module" src="../js/raidroom.js"></script>
<script>
  const zoneData = {
    A: {
      title: "설원", difficulty: "★★☆ 보통",
      desc: "끝없이 펼쳐진 얼음 대지. 발소리조차 얼어붙는 이곳에 빙룡이 잠들어 있어.",
      boss: "빙룡 크리오스", diff: "보통", trait: "빙결 / 눈보라", type: "불꽃, 격투",
      room: "battleroom1"
    },
    B: {
      title: "화산", difficulty: "★★★ 어려움",
      desc: "용암이 흐르는 분화구 심부. 열기만으로도 포켓몬이 지쳐가는 극한의 전장이야.",
      boss: "염룡 이그니스", diff: "어려움", trait: "쾌청 / 지속 화상", type: "물, 바위",
      room: "battleroom2"
    },
    C: {
      title: "심해", difficulty: "★★★ 어려움",
      desc: "빛조차 닿지 않는 심해 유적. 수압과 어둠 속에서 해룡이 기다리고 있어.",
      boss: "해룡 아비스", diff: "어려움", trait: "비 / 잠수", type: "전기, 풀",
      room: "battleroom3"
    }
  }

  function applyZoneUI(key) {
    const d = zoneData[key]
    if (!d) return
    document.getElementById('detail-title').textContent      = d.title
    document.getElementById('detail-desc').textContent       = d.desc
    document.getElementById('detail-difficulty').textContent = d.difficulty
    document.getElementById('f-boss').textContent            = d.boss
    document.getElementById('f-diff').textContent            = d.diff
    document.getElementById('f-trait').textContent           = d.trait
    document.getElementById('f-type').textContent            = d.type
    document.getElementById('selected-badge').textContent    = `구역 ${key} — ${d.title}`
    document.getElementById('zone-hint').textContent         = ''
    document.querySelectorAll('.map .zone').forEach(z =>
      z.classList.toggle('selected', z.dataset.zone === key))
    document.querySelectorAll('.zone-tab').forEach(t =>
      t.classList.toggle('selected', t.dataset.zone === key))
  }

  function renderZone(key) {
    applyZoneUI(key)
    if (typeof window.setSelectedZone === 'function') window.setSelectedZone(key)
    if (window.innerWidth <= 480)
      document.querySelector('.details').scrollIntoView({ behavior: 'smooth', block: 'start' })
  }

  document.querySelectorAll('.map .zone, .zone-tab').forEach(el =>
    el.addEventListener('click', () => renderZone(el.dataset.zone)))

  // raidroom.js에서 다른 사람이 구역 바꿀 때 호출
  window.syncZoneUI = applyZoneUI
  window.getZoneData = () => zoneData
  window.getZoneHintEl = () => document.getElementById('zone-hint')
</script>
</body>
</html>
