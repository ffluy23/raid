<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Double Battle Room 1</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }

.page { min-height: 100vh; background: #fff;
        display: flex; justify-content: center; align-items: center; }

.container { width: 100%; max-width: 420px; padding: 40px 20px; }

.title { font-size: 24px; font-weight: 600; margin-bottom: 24px;
         text-align: center; color: #111; }

.team-box { display: flex; gap: 16px; margin-bottom: 20px; }

.team { flex: 1; border: 1px solid #ddd; border-radius: 10px; padding: 14px; }

.team-label { font-size: 12px; color: #888; margin-bottom: 10px; font-weight: 600; }

.player-row { display: flex; justify-content: space-between; align-items: center;
              font-size: 14px; margin: 6px 0; color: #111; }

.ready-icon { font-size: 14px; }

.btn-row { display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap; }

.btn { flex: 1; padding: 14px; border: none; border-radius: 8px;
       background: #000; color: #fff; font-weight: 600;
       cursor: pointer; transition: 0.2s; min-width: 80px; }
.btn:hover   { background: #222; }
.btn:active  { transform: scale(0.98); }
.btn:disabled { opacity: 0.45; cursor: not-allowed; }

#spectator-list { margin-top: 16px; font-size: 13px; color: #888; text-align: center; }

/* 교체 요청 수신 팝업 */
#swap-popup {
  display: none; margin-top: 16px;
  border: 1.5px solid #e67e22; border-radius: 10px;
  background: #fff8f0; padding: 14px 16px;
  font-size: 14px; color: #333;
}
#swap-popup-msg { margin-bottom: 10px; line-height: 1.6; font-weight: 500; white-space: pre-line; }
#swap-accept-btn { background: #27ae60; }
#swap-accept-btn:hover { background: #219a52; }
#swap-reject-btn { background: #e74c3c; }
#swap-reject-btn:hover { background: #c0392b; }

/* 교체 대상 선택 모달 */
#swap-target-modal {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.45); z-index: 1000;
  justify-content: center; align-items: center;
}
#swap-target-inner {
  background: #fff; border-radius: 12px;
  padding: 24px 20px; width: 90%; max-width: 320px;
}
#swap-target-inner h3 { font-size: 16px; font-weight: 600; margin-bottom: 14px; color: #111; }
#swap-target-list { display: flex; flex-direction: column; gap: 6px; }
#swap-cancel-btn { margin-top: 12px; width: 100%; background: #aaa; }
#swap-cancel-btn:hover { background: #888; }

/* 어드민 패널 */
#admin-panel {
  display: none;
  margin-top: 24px;
  border: 1.5px solid #9b59b6;
  border-radius: 12px;
  padding: 16px;
  background: #faf5ff;
}
#admin-panel-title {
  font-size: 12px; font-weight: 700; color: #9b59b6;
  letter-spacing: 0.08em; margin-bottom: 10px;
}
#admin-hint {
  font-size: 12px; color: #777; margin-bottom: 10px; min-height: 16px;
}
#admin-player-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
}
.admin-slot-btn {
  display: flex; flex-direction: column; align-items: flex-start;
  padding: 10px 12px; border: 1.5px solid #ddd; border-radius: 8px;
  background: #fff; cursor: pointer; transition: 0.15s;
  text-align: left;
}
.admin-slot-btn:hover { border-color: #9b59b6; background: #f5eeff; }
.admin-slot-btn.selected { border-color: #9b59b6; background: #e8d5ff; }
.admin-slot-btn.empty { opacity: 0.45; cursor: default; }
.admin-slot-btn.empty:hover { border-color: #ddd; background: #fff; }
.admin-slot-label { font-size: 10px; color: #999; font-weight: 600; margin-bottom: 2px; }
.admin-slot-name  { font-size: 13px; color: #111; font-weight: 500;
                    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 120px; }

.notice {
  background: #f8f8f8; border: 1px solid #e5e5e5; border-radius: 10px;
  padding: 14px; font-size: 13px; color: #555; line-height: 1.5; margin-bottom: 20px;
}
.notice strong { color: #111; font-weight: 600; }

@media (min-width: 768px) {
  .container { max-width: 900px; padding: 60px 32px; }
  .team-box { gap: 24px; }
  .team { padding: 20px; }
  .title { font-size: 28px; }
  #admin-player-grid { grid-template-columns: 1fr 1fr 1fr 1fr; }
}
@media (max-width: 480px) {
  .container { padding: 24px 16px; }
  .team-box { flex-direction: column; }
  .title { font-size: 20px; }
  .btn { padding: 12px; }
}
</style>
</head>

<body class="page">
<div class="container">

  <div class="title">Double Battle Room</div>

  <div class="notice">
    자신의 차례가 아니면 자리를 바꿔주세요.<br>
    자리 이동이 원활하게 되지 않을 땐, 가만히 계시면 강제로 이동시켜드립니다.
  </div>

  <div class="team-box">
    <div class="team">
      <div class="team-label">TEAM A</div>
      <div class="player-row">
        <span id="player1">Player1: 대기 중...</span>
        <span class="ready-icon" id="player1-ready">⬜</span>
      </div>
      <div class="player-row">
        <span id="player2">Player2: 대기 중...</span>
        <span class="ready-icon" id="player2-ready">⬜</span>
      </div>
    </div>
    <div class="team">
      <div class="team-label">TEAM B</div>
      <div class="player-row">
        <span id="player3">Player3: 대기 중...</span>
        <span class="ready-icon" id="player3-ready">⬜</span>
      </div>
      <div class="player-row">
        <span id="player4">Player4: 대기 중...</span>
        <span class="ready-icon" id="player4-ready">⬜</span>
      </div>
    </div>
  </div>

  <div class="btn-row">
    <button class="btn" id="readyBtn">Ready</button>
    <button class="btn" id="reqSwapBtn" style="display:none">자리 교체 요청</button>
    <button class="btn" id="swapBtn" style="display:none">자리 이동</button>
    <button class="btn" id="leaveBtn">Leave</button>
  </div>

  <!-- 교체 요청 수신 팝업 -->
  <div id="swap-popup">
    <div id="swap-popup-msg"></div>
    <div class="btn-row">
      <button class="btn" id="swap-accept-btn">수락</button>
      <button class="btn" id="swap-reject-btn">거절</button>
    </div>
  </div>

  <div id="spectator-list">관전자 없음</div>

  <!-- 어드민 전용 강제 교체 패널 -->
  <div id="admin-panel">
    <div id="admin-panel-title">🔧 ADMIN — 강제 자리 교체</div>
    <div id="admin-hint">교체할 플레이어를 선택하세요</div>
    <div id="admin-player-grid"></div>
  </div>

</div>

<!-- 교체 대상 선택 모달 -->
<div id="swap-target-modal">
  <div id="swap-target-inner">
    <h3>교체할 상대를 선택하세요</h3>
    <div id="swap-target-list"></div>
    <button class="btn" id="swap-cancel-btn"
      onclick="document.getElementById('swap-target-modal').style.display='none'">취소</button>
  </div>
</div>

<script>const ROOM_ID = "doublebattleroom1"</script>
<script type="module" src="../js/doublebattleroom.js"></script>
</body>
</html>
