<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matching</title>
<style>
@import url('https://cdn.jsdelivr.net/gh/MonadABXY/mona-font/web/mona.css');

* { margin: 0; padding: 0; box-sizing: border-box;
    font-family: 'Mona12', sans-serif; }

.page { min-height: 100vh; background: #fff;
        display: flex; justify-content: center; align-items: center; }

.container { width: 100%; max-width: 380px; padding: 40px 20px; text-align: center; }

.title { font-size: 22px; font-weight: 600; color: #111; margin-bottom: 8px; }
.subtitle { font-size: 13px; color: #888; margin-bottom: 32px; }

/* 플레이어 슬롯 */
.slots { display: grid; grid-template-columns: 1fr 1fr;
         gap: 10px; margin-bottom: 32px; }

.slot {
  border: 1.5px solid #eee; border-radius: 10px;
  padding: 14px 12px; font-size: 13px;
  color: #bbb; background: #fafafa;
  transition: 0.3s;
  min-height: 56px; display: flex;
  align-items: center; justify-content: center;
  flex-direction: column; gap: 4px;
}
.slot.filled { border-color: #111; color: #111; background: #fff; }
.slot.me { border-color: #111; background: #111; color: #fff; }

.slot-label { font-size: 10px; color: inherit; opacity: 0.5; font-weight: 600; }
.slot-name { font-size: 13px; font-weight: 500; }

/* 버튼 */
.btn {
  width: 100%; padding: 16px;
  border: none; border-radius: 10px;
  background: #111; color: #fff;
  font-size: 15px; font-weight: 600;
  cursor: pointer; transition: 0.2s;
  font-family: 'Mona12', sans-serif;
}
.btn:hover { background: #333; }
.btn:active { transform: scale(0.98); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

.btn-cancel {
  background: #fff; color: #111;
  border: 1.5px solid #ddd; margin-top: 10px;
}
.btn-cancel:hover { background: #f5f5f5; }

.status-msg {
  font-size: 13px; color: #888; margin-bottom: 20px;
  min-height: 20px;
}

.elapsed {
  font-size: 12px; color: #bbb; margin-top: 8px;
}
</style>
</head>

<body class="page">
<div class="container">

  <div class="title">Matching</div>
  <div class="subtitle">4명이 모이면 자동으로 시작</div>

  <div class="slots" id="slots" style="display:none">
    <div class="slot" id="slot-0"><span class="slot-label">P1</span><span class="slot-name">대기 중...</span></div>
    <div class="slot" id="slot-1"><span class="slot-label">P2</span><span class="slot-name">대기 중...</span></div>
    <div class="slot" id="slot-2"><span class="slot-label">P3</span><span class="slot-name">대기 중...</span></div>
    <div class="slot" id="slot-3"><span class="slot-label">P4</span><span class="slot-name">대기 중...</span></div>
  </div>

  <div class="status-msg" id="status-msg"></div>
  <div class="elapsed" id="elapsed"></div>

  <button class="btn" id="start-btn">매칭 시작</button>
  <button class="btn btn-cancel" id="cancel-btn" style="display:none">취소</button>

</div>

<script type="module">
import { auth, db } from "../js/firebase.js"
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"
import { doc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"

let myUid = null
let myName = null
let polling = null
let elapsed = 0
let elapsedTimer = null
let unsubQueue = null

const startBtn  = document.getElementById("start-btn")
const cancelBtn = document.getElementById("cancel-btn")
const statusMsg = document.getElementById("status-msg")
const slotsEl   = document.getElementById("slots")
const elapsedEl = document.getElementById("elapsed")

onAuthStateChanged(auth, async user => {
  if (!user) { location.href = "/login.html"; return }
  myUid = user.uid

  try {
    const snap = await getDoc(doc(db, "users", myUid))
    myName = snap.exists()
      ? (snap.data().nickname || user.displayName || "트레이너")
      : (user.displayName || "트레이너")
  } catch {
    myName = user.displayName || "트레이너"
  }
})

// ── 매칭 시작
startBtn.addEventListener("click", () => {
  if (!myUid) { statusMsg.textContent = "로그인 정보를 불러오는 중이야."; return }
  setUI("searching")
  startPolling()
  startElapsed()
  listenQueue()
})

// ── 취소
cancelBtn.addEventListener("click", async () => {
  stopAll()
  await fetch("/api/matchmaking-cancel", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ uid: myUid }),
  })
  setUI("idle")
})

// ── 폴링: 즉시 1회 + 2초마다
function startPolling() {
  callMatchmaking()
  polling = setInterval(callMatchmaking, 2000)
}

async function callMatchmaking() {
  try {
    const res = await fetch("/api/matchmaking", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ uid: myUid, name: myName }),
    })
    const data = await res.json()

    if (data.status === "matched") {
      stopAll()
      setUI("matched")
      setTimeout(() => { location.href = `/double/${data.roomId}` }, 1000)
    } else if (data.reason === "no_room") {
      statusMsg.textContent = "룸이 가득 찼어. 잠시 후 다시 시도할게..."
    }
  } catch (e) {
    console.error("[matchmaking]", e)
  }
}

// ── Firestore 실시간: 내 문서 status 감시
function listenQueue() {
  slotsEl.style.display = "grid"
  updateSlots([{ name: myName, isMe: true }])

  unsubQueue = onSnapshot(doc(db, "matchmaking", myUid), (snap) => {
    if (!snap.exists()) return
    const data = snap.data()
    if (data.status === "matched" && data.roomId) {
      stopAll()
      setUI("matched")
      setTimeout(() => { location.href = `/double/${data.roomId}` }, 1000)
    }
  })
}

function updateSlots(players) {
  for (let i = 0; i < 4; i++) {
    const slot = document.getElementById(`slot-${i}`)
    const p = players[i]
    if (p) {
      slot.className = "slot " + (p.isMe ? "me" : "filled")
      slot.innerHTML = `<span class="slot-label">P${i+1}</span><span class="slot-name">${p.name}</span>`
    } else {
      slot.className = "slot"
      slot.innerHTML = `<span class="slot-label">P${i+1}</span><span class="slot-name">대기 중...</span>`
    }
  }
}

// ── 경과 시간
function startElapsed() {
  elapsed = 0
  elapsedTimer = setInterval(() => {
    elapsed++
    const m = String(Math.floor(elapsed / 60)).padStart(2, "0")
    const s = String(elapsed % 60).padStart(2, "0")
    elapsedEl.textContent = `${m}:${s}`
  }, 1000)
}

function stopAll() {
  clearInterval(polling)
  clearInterval(elapsedTimer)
  if (unsubQueue) unsubQueue()
  polling = elapsedTimer = unsubQueue = null
}

// ── UI 상태 전환
function setUI(state) {
  if (state === "idle") {
    slotsEl.style.display = "none"
    startBtn.style.display = "block"
    startBtn.disabled = false
    cancelBtn.style.display = "none"
    statusMsg.textContent = ""
    elapsedEl.textContent = ""
  } else if (state === "searching") {
    startBtn.style.display = "none"
    cancelBtn.style.display = "block"
    statusMsg.textContent = "상대를 찾는 중..."
  } else if (state === "matched") {
    cancelBtn.style.display = "none"
    statusMsg.textContent = "매칭 완료!"
    elapsedEl.textContent = ""
  }
}
</script>
</body>
</html>
