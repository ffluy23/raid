<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  @import url('https://cdn.jsdelivr.net/npm/pretendard/dist/web/static/pretendard.css');

body.login-page {
  margin: 0;
  height: 100vh;
  background: #0f1115;
  font-family: "Pretendard", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  color: #d1d5db;
}

.login-container {
  text-align: left;
  width: 100%;
  display: flex;
  justify-content: center;
  padding: 0 20px;
  box-sizing: border-box;
}

.login-container h2 {
  font-size: 14px;
  font-weight: normal;
  margin-bottom: 12px;
  color: #9ca3af;
  letter-spacing: 1px;
}

.login-box {
  width: 260px;
  max-width: 100%;
  padding: 20px;
  background: #14171d;
  border: 1px solid #2a2f3a;
  border-radius: 6px;
  box-shadow: 0 0 0 1px rgba(255,255,255,0.02) inset;
  display: flex;
  flex-direction: column;
  gap: 10px;
  position: relative;
  box-sizing: border-box;
}

.login-box input {
  background: #0d0f14;
  border: 1px solid #2a2f3a;
  color: #e5e7eb;
  padding: 10px;
  font-size: 13px;
  border-radius: 4px;
  outline: none;
  transition: 0.15s;
  width: 100%;
  box-sizing: border-box;
  /* 모바일 Safari 자동 확대 방지 */
  -webkit-text-size-adjust: 100%;
}

.login-box input::placeholder {
  color: #6b7280;
}

.login-box input:focus {
  border-color: #3b4252;
  background: #10131a;
}

.btn {
  margin-top: 6px;
  padding: 10px;
  font-size: 12px;
  background: #1c212b;
  border: 1px solid #2f3542;
  color: #cbd5e1;
  cursor: pointer;
  border-radius: 4px;
  transition: 0.15s;
  width: 100%;
  box-sizing: border-box;
}

.btn:hover {
  background: #232938;
}

.btn:active {
  transform: translateY(1px);
}

.login-box::after {
  content: "";
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    to bottom,
    rgba(255,255,255,0.02),
    rgba(255,255,255,0.02) 1px,
    transparent 1px,
    transparent 3px
  );
  pointer-events: none;
  opacity: 0.15;
}

/* ── 모바일 ── */
@media (max-width: 480px) {
  body.login-page {
    align-items: center;
  }

  .login-box {
    width: 100%;
    padding: 24px 20px;
    border-radius: 8px;
  }

  .login-box input {
    padding: 12px 10px;
    font-size: 16px; /* Safari 자동 줌 방지 (16px 미만이면 줌됨) */
  }

  .btn {
    padding: 13px;
    font-size: 13px;
  }
}
</style>

<title>Login</title>
</head>

<body class="login-page">

  <div class="login-container">
    <div class="login-box">
      <input type="email" id="email" placeholder="email" autocomplete="email">
      <input type="password" id="password" placeholder="password" autocomplete="current-password">
      <button class="btn" id="loginBtn">Login</button>
    </div>
  </div>

  <script type="module">
    import { auth } from "./js/firebase.js";
    import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const loginBtn = document.getElementById("loginBtn");

    loginBtn.addEventListener("click", async () => {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      try {
        await signInWithEmailAndPassword(auth, email, password);
        window.location.href = "main.html";
      } catch (error) {
        console.error(error);
      }
    });
  </script>

</body>
</html>
