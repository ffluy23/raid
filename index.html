<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
@import url('https://cdn.jsdelivr.net/gh/MonadABXY/mona-font/web/mona.css');
/* 기본 리셋 */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Mona12',sans-serif;
}

/* 배경 */
.login-page {
  height: 100vh;
  background: #ffffff;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* 컨테이너 */
.login-container {
  width: 100%;
  max-width: 400px;
  padding: 40px 24px;
  text-align: center;
}

/* 타이틀 */
.login-container h2 {
  font-size: 28px;
  font-weight: 600;
  margin-bottom: 32px;
  color: #111;
}

/* 박스 */
.login-box {
  display: flex;
  flex-direction: column;
  gap: 16px;
}

/* 인풋 */
.login-box input {
  padding: 14px 16px;
  border: 1px solid #ddd;
  border-radius: 8px;
  font-size: 14px;
  transition: 0.2s;
}

/* 포커스 */
.login-box input:focus {
  outline: none;
  border-color: #000;
}

/* 버튼 */
.btn {
  padding: 14px;
  border: none;
  border-radius: 8px;
  background: #000;
  color: #fff;
  font-weight: 600;
  cursor: pointer;
  transition: 0.2s;
}

/* hover */
.btn:hover {
  background: #222;
}

/* active */
.btn:active {
  transform: scale(0.98);
}

/* 모바일 */
@media (max-width: 480px) {
  .login-container {
    padding: 24px 16px;
  }

  .login-container h2 {
    font-size: 24px;
  }

  .login-box input {
    padding: 12px;
  }

  .btn {
    padding: 12px;
  }
}
</style>

<title>Login</title>
</head>

<body class="login-page">

  <div class="login-container">
    <h2>Zenith Frontier</h2>

    <div class="login-box">
      <input type="email" id="email" placeholder="이메일">
      <input type="password" id="password" placeholder="비밀번호">
      <button class="btn" id="loginBtn">로그인</button>
    </div>
  </div>

  <script type="module">
    import { auth } from "./js/firebase.js";
    import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const loginBtn = document.getElementById("loginBtn");

    loginBtn.addEventListener("click", async () => {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      try {
        await signInWithEmailAndPassword(auth, email, password);
        window.location.href = "main.html";
      } catch (error) {
        console.error(error);
      }
    });
  </script>

</body>
</html>
