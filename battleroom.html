<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>연구 자료</title>
<style>
@import url('https://cdn.jsdelivr.net/npm/pretendard/dist/web/static/pretendard.css');

body {
  margin: 0;
  min-height: 100vh;
  background: #0f1115;
  font-family: "Pretendard", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  color: #d1d5db;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 20px;
  box-sizing: border-box;
}

* {
  -webkit-tap-highlight-color: transparent;
}

body::before {
  content: "research_index/";
  font-size: 13px;
  color: #9ca3af;
  margin-bottom: 12px;
  letter-spacing: 1px;
}

.menu-btn {
  width: 280px;
  max-width: 100%;
  padding: 8px 10px;
  background: transparent;
  border: none;
  border-bottom: 1px solid #2a2f3a;
  color: #d1d5db;
  font-size: 13px;
  text-align: left;
  cursor: pointer;
  transition: 0.12s;
  display: flex;
  justify-content: space-between;
  align-items: center;
  box-sizing: border-box;
}

.menu-btn::before {
  content: "📄 ";
  opacity: 0.6;
}

.menu-btn::after {
  content: ".dat";
  color: #6b7280;
  font-size: 12px;
}

.menu-btn:hover {
  background: #10131a;
  padding-left: 14px;
}

.menu-btn:active {
  transform: translateY(1px);
}

.menu-btn.locked::before {
  content: "🔒 ";
  opacity: 0.6;
}

.modal-bg {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  display: none;
  justify-content: center;
  align-items: center;
  padding: 16px;
  box-sizing: border-box;
  z-index: 100;
}

.modal-bg.open {
  display: flex;
}

.modal {
  width: 300px;
  max-width: 100%;
  background: #14171d;
  border: 1px solid #2a2f3a;
  border-radius: 6px;
  padding: 20px;
  box-sizing: border-box;
  box-shadow: 0 0 0 1px rgba(255,255,255,0.02) inset;
}

.modal-title {
  font-size: 13px;
  color: #e5e7eb;
  margin-bottom: 4px;
}

.modal-sub {
  font-size: 12px;
  color: #6b7280;
  margin-bottom: 14px;
}

.input-row {
  display: flex;
  gap: 6px;
}

.input-row input {
  flex: 1;
  min-width: 0;
  padding: 9px;
  background: #0d0f14;
  border: 1px solid #2a2f3a;
  color: #e5e7eb;
  font-size: 16px;
  border-radius: 4px;
  outline: none;
  transition: 0.15s;
  box-sizing: border-box;
  font-family: inherit;
}

.input-row input:focus {
  background: #10131a;
  border-color: #3b4252;
}

.input-row input.error {
  border-color: #5a2f2f;
  background: #1a1010;
}

.confirm-btn {
  padding: 9px 12px;
  background: #1c212b;
  border: 1px solid #2f3542;
  color: #cbd5e1;
  font-size: 12px;
  border-radius: 4px;
  cursor: pointer;
  transition: 0.15s;
  white-space: nowrap;
  font-family: inherit;
}

.confirm-btn:hover { background: #232938; }
.confirm-btn:active { transform: translateY(1px); }

.err-msg {
  font-size: 12px;
  margin-top: 8px;
  color: #6b7280;
  min-height: 18px;
}

body::after {
  content: "";
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    to bottom,
    rgba(255,255,255,0.02),
    rgba(255,255,255,0.02) 1px,
    transparent 1px,
    transparent 3px
  );
  opacity: 0.06;
  pointer-events: none;
}

@media (max-width: 480px) {
  body::before { font-size: 12px; }

  .menu-btn {
    width: 100%;
    padding: 13px 10px;
    font-size: 14px;
  }
  .menu-btn:hover { padding-left: 14px; }

  .modal-bg {
    align-items: flex-end;
    padding: 0;
  }

  .modal {
    width: 100%;
    border-radius: 12px 12px 0 0;
    padding: 24px 16px;
  }
}
</style>
</head>
<body>

  <!-- 파일 목록 -->
  <div style="display:flex; flex-direction:column; align-items:center;">
    <button class="menu-btn" onclick="location.href='pages/raidroom1.html'">기밀 자료1</button>
    <button class="menu-btn locked" onclick="openLock('pages/raidroom2.html', '2')">기밀 자료2</button>
    <button class="menu-btn locked" onclick="openLock('pages/raidroom3.html', '3')">기밀 자료3</button>
  </div>

  <!-- 서브 비번 모달 -->
  <div class="modal-bg" id="sub-modal-bg" onclick="onBgClick(event)">
    <div class="modal">
      <div class="modal-title">잠금 처리된 문서</div>
      <div class="modal-sub">비밀번호를 입력</div>
      <div class="input-row">
        <input type="text" id="pw-input" placeholder="Password" autocomplete="off" />
        <button class="confirm-btn" onclick="checkPw()">Enter</button>
      </div>
      <div class="err-msg" id="err-msg"></div>
    </div>
  </div>

<script>
  const PASSWORDS = {
    '2': '보송송의매력은어디까지인가',
    '3': '전룡이되기전그순간을영원히기억해',
  };

  let targetUrl = '';
  let targetKey = '';

  const subBg   = document.getElementById('sub-modal-bg');
  const pwInput = document.getElementById('pw-input');
  const errMsg  = document.getElementById('err-msg');

  function openLock(url, key) {
    targetUrl = url;
    targetKey = key;
    pwInput.value = '';
    pwInput.classList.remove('error');
    errMsg.textContent = '';
    errMsg.style.color = '';
    subBg.classList.add('open');
    setTimeout(() => pwInput.focus(), 80);
  }

  function checkPw() {
    const val = pwInput.value.trim();
    if (val === PASSWORDS[targetKey]) {
      errMsg.style.color = '#0f6e56';
      errMsg.textContent = 'Open';
      setTimeout(() => location.href = targetUrl, 280);
    } else {
      pwInput.classList.add('error');
      errMsg.style.color = '';
      errMsg.textContent = '비밀번호 틀림';
      pwInput.select();
      pwInput.focus();
    }
  }

  function closeModal() {
    subBg.classList.remove('open');
  }

  function onBgClick(e) {
    if (e.target === subBg) closeModal();
  }

  pwInput.addEventListener('keydown', e => { if (e.key === 'Enter') checkPw(); });
  pwInput.addEventListener('input', () => {
    pwInput.classList.remove('error');
    errMsg.textContent = '';
    errMsg.style.color = '';
  });

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModal();
  });
</script>

</body>
</html>
