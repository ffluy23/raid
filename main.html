<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  @import url('https://cdn.jsdelivr.net/npm/pretendard/dist/web/static/pretendard.css');

body.main-page {
  margin: 0;
  height: 100vh;
  background: #0f1115;
  font-family: "Pretendard", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  color: #d1d5db;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 0 20px;
  box-sizing: border-box;
}

* {
  -webkit-tap-highlight-color: transparent;
}

.main-container {
  width: 320px;
  max-width: 100%;
  padding: 24px;
  background: #14171d;
  border: 1px solid #2a2f3a;
  border-radius: 6px;
  box-shadow: 0 0 0 1px rgba(255,255,255,0.02) inset;
  position: relative;
  box-sizing: border-box;
}

.logo {
  font-size: 13px;
  color: #9ca3af;
  margin-bottom: 18px;
  letter-spacing: 1px;
}

.menu {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.menu-btn {
  text-align: left;
  padding: 10px;
  background: #0d0f14;
  border: 1px solid #2a2f3a;
  color: #e5e7eb;
  font-size: 13px;
  border-radius: 4px;
  cursor: pointer;
  transition: 0.15s;
  position: relative;
  width: 100%;
  box-sizing: border-box;
}

.menu-btn::before {
  content: "> ";
  color: #6b7280;
}

.menu-btn:hover {
  background: #10131a;
  border-color: #3b4252;
}

.menu-btn:active {
  transform: translateY(1px);
}

.menu-btn.active {
  background: #1a1f2b;
  border-color: #4b5563;
}

.main-container::after {
  content: "";
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    to bottom,
    rgba(255,255,255,0.02),
    rgba(255,255,255,0.02) 1px,
    transparent 1px,
    transparent 3px
  );
  opacity: 0.1;
  pointer-events: none;
}

/* ── 모바일 ── */
@media (max-width: 480px) {
  .main-container {
    width: 100%;
    padding: 20px;
    border-radius: 8px;
  }

  .menu-btn {
    padding: 13px 10px;
    font-size: 14px;
  }
}
</style>

<title>Sonnet</title>
</head>

<body class="main-page">

  <div class="main-container">

    <div class="logo">Sonnet</div>

    <div class="menu">
      <button class="menu-btn" onclick="location.href='mail.html'">
        메일
      </button>
      <button class="menu-btn" onclick="location.href='document.html'">
        문서
      </button>
      <button class="menu-btn" onclick="location.href='battleroom.html'">
        연구자료
      </button>
    </div>

  </div>

</body>
</html>
