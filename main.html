    body {
      margin: 0;
      background-color: #e0e0e0;
      font-family: 'Escoredream', sans-serif;

      /* 화면 정중앙 배치 */
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      width: 90%;
      max-width: 600px;
      background-color: #ffffff;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);

      /* 텍스트 가운데 정렬 */
      text-align: center;
    }

    .title {
      font-size: 22px;
      font-weight: bold;
      margin-bottom: 12px;
    }

    .content {
      font-size: 15px;
      line-height: 1.6;
    }

    @media (max-width: 600px) {
      .container {
        padding: 16px;
      }

      .title {
        font-size: 18px;
      }

      .content {
        font-size: 14px;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="title">제니스 아카데미 전원에게</div>
    <div class="content">
       안녕하세요.<br><br>
소넷입니다.<br><br>

금일 스토리 0차 진행이 마무리되었습니다.<br>
예상보다 많은 분들이 함께해주셨고, 생각 이상으로 즐겨주신 것 같아 기쁘게 생각합니다.<br><br>

배틀 시스템을 직접 제작하며 여러 시행착오가 있었지만,<br> 여러분이 남겨주신 반응과 플레이를 보며 충분히 보람을 느꼈습니다.<br>

진심으로 감사드립니다.<br><br>

보다 나은 경험으로 찾아뵐 수 있도록 준비하겠습니다.<br>

그때 다시 뵙겠습니다.<br><br>

방학 잘 보내라~!<br><br>
— 소넷
    </div>
  </div>
